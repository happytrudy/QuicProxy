name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux x64 (musl)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.PRIVATE_KEY }}
      - run: git clone git@github.com:RealBikiniBottom/premium.git ./src/premium

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-musl-release

      - uses: taiki-e/install-action@cross

      - name: Build
        run: cross build --release --target x86_64-unknown-linux-musl

      - name: Package
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd target/x86_64-unknown-linux-musl/release
          tar czf ../../../quicproxy-core-${VERSION}-linux-x64.tar.gz quicproxy

      - uses: actions/upload-artifact@v4
        with:
          name: quicproxy-core-${{ github.ref_name }}-linux-x64
          path: quicproxy-core-${{ github.ref_name }}-linux-x64.tar.gz

  build-windows:
    name: Windows x64 (MSVC, static CRT)
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      RUSTFLAGS: -C target-feature=+crt-static
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.PRIVATE_KEY }}
      - run: git clone git@github.com:RealBikiniBottom/premium.git ./src/premium

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-msvc-release

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build Core
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package Core (Native)
        shell: pwsh
        run: |
          Compress-Archive -Path target/x86_64-pc-windows-msvc/release/quicproxy.exe -DestinationPath quicproxy-core-${{ github.ref_name }}-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: quicproxy-core-${{ github.ref_name }}-windows-x64
          path: quicproxy-core-${{ github.ref_name }}-windows-x64.zip

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"

      - name: Install Flutter dependencies
        working-directory: ./src/premium/quicproxy_flutter
        run: flutter pub get

      - name: Extract version from Cargo.toml
        id: extract_version
        shell: pwsh
        run: |
          $cargoToml = Get-Content "Cargo.toml" -Raw
          if ($cargoToml -match 'version\s*=\s*"([^"]+)"') {
            $version = $matches[1]
            $versionStr = "v$version"
            echo "VERSION_STR=$versionStr" >> $env:GITHUB_OUTPUT
            echo "VERSION_NUM=$version" >> $env:GITHUB_OUTPUT
            Write-Host "✓ Extracted version: $versionStr"
          } else {
            throw "Failed to extract version from Cargo.toml"
          }

      - name: Sync core version to Flutter code
        shell: pwsh
        run: |
          $versionStr = "${{ steps.extract_version.outputs.VERSION_STR }}"
          $vpnServicePath = "src/premium/quicproxy_flutter/lib/services/vpn_service.dart"

          if (-not (Test-Path $vpnServicePath)) {
            throw "vpn_service.dart not found at $vpnServicePath"
          }

          $content = Get-Content $vpnServicePath -Raw
          $updatedContent = $content -replace 'static const String currentCoreVersion = ''[^'']+'';', "static const String currentCoreVersion = '$versionStr';"
          Set-Content -Path $vpnServicePath -Value $updatedContent -NoNewline
          Write-Host "✓ Updated core version to $versionStr in Flutter code"

      - name: Build Flutter Windows
        working-directory: ./src/premium/quicproxy_flutter
        run: flutter build windows

      - name: Prepare Flutter build directory
        working-directory: ./
        shell: pwsh
        run: |
          # 确保源目录存在
          $sourceDir = "src/premium/quicproxy_flutter/build/windows/x64/runner/Release"
          if (-not (Test-Path $sourceDir)) {
            throw "Flutter build directory not found at $sourceDir. Please check if flutter build succeeded."
          }

          # 列出源目录内容用于调试
          Write-Host "Contents of $sourceDir"
          Get-ChildItem $sourceDir | ForEach-Object { Write-Host "  - $($_.Name)" }

          # 创建目标目录（相对于项目根目录）
          $destDir = "flutter_build_dir/"
          New-Item -ItemType Directory -Path $destDir -Force | Out-Null

          # 复制所有 Flutter 构建文件
          Copy-Item -Path "$sourceDir/*" -Destination $destDir -Recurse -Force
          Write-Host "✓ Copied Flutter build files to $destDir"

      - name: Copy core.exe to Flutter build directory
        working-directory: ./
        shell: pwsh
        run: |
          $versionDir = "${{ steps.extract_version.outputs.VERSION_STR }}"
          $coreDir = "flutter_build_dir/core_workspace/$versionDir"
          New-Item -ItemType Directory -Path $coreDir -Force | Out-Null

          # 复制 core.exe
          $exe = "target/x86_64-pc-windows-msvc/release/quicproxy.exe"
          if (-not (Test-Path $exe)) {
            throw "Core executable not found at $exe"
          }
          $destExe = Join-Path $coreDir "quicproxy_core.exe"
          Copy-Item -Path $exe -Destination $destExe -Force
          Write-Host "✓ Copied core.exe to $destExe"

          # 复制 wintun.dll
          $wintunDll = "src/premium/wintun/bin/amd64/wintun.dll"
          if (Test-Path $wintunDll) {
            Copy-Item -Path $wintunDll -Destination $coreDir -Force
            Write-Host "✓ Copied wintun.dll to $coreDir"
          } else {
            Write-Warning "wintun.dll not found at $wintunDll"
          }

          # 验证所有必需的文件都已就位
          Write-Host "`nVerifying core directory contents:"
          Get-ChildItem $coreDir -Recurse | ForEach-Object { 
            if ($_.PSIsContainer) {
              Write-Host "  Directory: $($_.FullName)"
            } else {
              Write-Host "  File: $($_.FullName) - $([math]::Round($_.Length/1KB, 2)) KB"
            }
          }

      - name: Compile Inno Setup Installer
        shell: pwsh
        working-directory: ./
        run: |
          # 检查 ISCC 是否存在
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "Inno Setup compiler not found at $iscc"
          }

          # 检查 .iss 文件
          $issPath = "./assets/windows_setup.iss"
          if (-not (Test-Path $issPath)) {
            throw "Inno Setup script not found at $issPath"
          }

          $flutterBuildDir = "flutter_build_dir/"

          # 列出要打包的文件
          Write-Host "`nFiles to be packaged by Inno Setup:"
          Get-ChildItem -Path $flutterBuildDir -Recurse | ForEach-Object { 
            if (-not $_.PSIsContainer) {
              Write-Host "  $($_.FullName) - $([math]::Round($_.Length/1KB, 2)) KB"
            }
          }

          # 编译安装程序
          Write-Host "`nCompiling Inno Setup installer..."
          & $iscc $issPath

          # 检查编译是否成功
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup compilation failed with exit code $LASTEXITCODE"
          }

          # 查找生成的安装程序
          $possiblePaths = @(
            "Output/QuicProxy-Windows-Setup.exe",
            "assets/Output/QuicProxy-Windows-Setup.exe",
            ".\QuicProxy-Windows-Setup.exe"
          )

          $installerPath = $null
          foreach ($path in $possiblePaths) {
            if (Test-Path $path) {
              $installerPath = (Resolve-Path $path).Path
              Write-Host "✓ Found installer at: $installerPath"
              break
            }
          }

          # 如果没找到，搜索整个项目
          if (-not $installerPath) {
            Write-Warning "Installer not found in default locations, searching entire project..."
            $foundInstaller = Get-ChildItem -Path . -Filter "*.exe" -Recurse | Where-Object { 
              $_.Name -like "*QuicProxy*Setup*" -or $_.Name -like "*Setup*.exe"
            } | Select-Object -First 1
            
            if ($foundInstaller) {
              $installerPath = $foundInstaller.FullName
              Write-Host "✓ Found installer at: $installerPath"
            } else {
              Write-Host "`nSearch results for .exe files:"
              Get-ChildItem -Path . -Filter "*.exe" -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }
              throw "No installer executable found after compilation"
            }
          }

          # 保存安装程序路径
          echo "INSTALLER_PATH=$installerPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "`n✓ Installer saved to environment: $installerPath"

          # 验证安装程序文件大小
          $installerInfo = Get-Item $installerPath
          Write-Host "Installer size: $([math]::Round($installerInfo.Length/1MB, 2)) MB"

      - name: Upload Flutter Windows Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quicproxy-flutter-${{ github.ref_name }}-windows-setup
          path: ${{ env.INSTALLER_PATH }}
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: quicproxy-core-${{ github.ref_name }}-linux-x64
          path: release-assets/linux

      - uses: actions/download-artifact@v4
        with:
          name: quicproxy-core-${{ github.ref_name }}-windows-x64
          path: release-assets/windows-core

      - uses: actions/download-artifact@v4
        with:
          name: quicproxy-flutter-${{ github.ref_name }}-windows-setup
          path: release-assets/windows-flutter

      - name: List release assets
        run: |
          echo "Linux assets:"
          ls -la release-assets/linux/
          echo "Windows core assets:"
          ls -la release-assets/windows-core/
          echo "Windows Flutter assets:"
          ls -la release-assets/windows-flutter/

      - name: Publish Release with Core Labels
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/linux/quicproxy-core-${{ github.ref_name }}-linux-x64.tar.gz
            release-assets/windows-core/quicproxy-core-${{ github.ref_name }}-windows-x64.zip
            release-assets/windows-flutter/QuicProxy-Windows-Setup.exe
          generate_release_notes: true
          name: QuicProxy ${{ github.ref_name }} - Core Release
          body: |
            ## QuicProxy ${{ github.ref_name }}

            ### Core Binaries
            - **Linux x64**: `quicproxy-core-${{ github.ref_name }}-linux-x64.tar.gz`
            - **Windows x64**: `quicproxy-core-${{ github.ref_name }}-windows-x64.zip`

            ### Windows Application
            - **Flutter Installer**: `QuicProxy-Windows-Setup.exe`

            ### Core Version
            This release includes core version `${{ github.ref_name }}`
